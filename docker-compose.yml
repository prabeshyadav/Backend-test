services:
  db:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - django_network

  web:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: django_app
    restart: unless-stopped

    env_file:
      - .env


    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - django_network

volumes:
  postgres_data:

networks:
  django_network:
    driver: bridge